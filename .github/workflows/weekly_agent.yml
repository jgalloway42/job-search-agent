name: Weekly Agent Run

on:
  schedule:
    - cron: "0 8 * * 1"   # Monday 8am UTC
  workflow_dispatch:        # allow manual trigger for testing

jobs:
  run-agent:
    name: Run Daily Agent Pipeline
    runs-on: ubuntu-latest

    env:
      DB_PATH: data/demo.db
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
      SCORE_THRESHOLD: ${{ secrets.SCORE_THRESHOLD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily agent
        run: python -m agent.graph

      - name: Run weekly learning pipeline
        run: python -m learning.graph

      - name: Commit updated scoring prompt (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/scoring_prompt.txt
          git diff --staged --quiet || git commit -m "chore: update scoring prompt from weekly learning run"
          git push

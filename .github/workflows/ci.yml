name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck (mypy)
        run: mypy .

      - name: Test (pytest)
        env:
          DB_PATH: data/demo.db
          GEMINI_API_KEY: dummy-key-for-ci
          GMAIL_ADDRESS: test@example.com
          GMAIL_APP_PASSWORD: dummy-password
          DIGEST_EMAIL: test@example.com
          SCORE_THRESHOLD: "6"
        run: pytest tests/ -v
